<style>
:root {
  --paper: #fffaf2;
  --ink: #3a2a18;
  --accent: #ff6b8a;
  --accent-2: #ffb84d;
  --line: #e9d8b3;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  font-family: "Kosugi Maru", system-ui, sans-serif;
  color: var(--ink);
  background:
    radial-gradient(800px 500px at 20% 10%, rgba(255,200,220,0.45), transparent 70%),
    radial-gradient(800px 500px at 80% 90%, rgba(180,230,255,0.45), transparent 70%),
    linear-gradient(180deg, #ffe5f0, #d8eaff);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
#app {
  display: flex; flex-direction: column;
  height: 100dvh; padding: 8px 12px 14px; gap: 8px;
  max-width: 480px; margin: 0 auto;
}
header { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.title {
  font-family: "Mochiy Pop P One", sans-serif;
  font-size: 22px;
  color: var(--accent);
  -webkit-text-stroke: 2.5px #fff; paint-order: stroke fill;
  text-shadow: 3px 3px 0 var(--ink), 5px 5px 0 var(--accent-2);
  margin: 0; transform: rotate(-2deg);
}
.icon-btn {
  background: #fff; border: 2.5px solid var(--ink); color: var(--ink);
  padding: 5px 10px; border-radius: 999px; font-size: 13px; font-weight: 900; cursor: pointer;
  box-shadow: 2px 2px 0 var(--ink);
}
.icon-btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--ink); }

/* Preview */
.preview {
  background: #fff;
  border: 3px solid var(--ink); border-radius: 18px;
  box-shadow: 4px 4px 0 var(--ink);
  flex: 1 1 auto; min-height: 240px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  position: relative;
}
#stage { width: 100%; height: 100%; display: block; }

/* Tabs */
.tabs {
  display: flex; gap: 6px; overflow-x: auto;
  padding: 2px 2px 4px;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 0 0 auto;
  background: #fff; border: 2.5px solid var(--ink); color: var(--ink);
  padding: 8px 14px; border-radius: 999px;
  font-family: "Mochiy Pop P One", sans-serif; font-size: 13px;
  cursor: pointer; box-shadow: 2px 2px 0 var(--ink);
}
.tab.on {
  background: var(--accent); color: #fff;
}
.tab:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--ink); }

/* Option panel */
.panel {
  background: #fff;
  border: 3px solid var(--ink); border-radius: 14px;
  box-shadow: 3px 3px 0 var(--ink);
  padding: 10px;
  max-height: 38vh;
  overflow-y: auto;
}
.panel h3 {
  margin: 2px 4px 8px;
  font-family: "Mochiy Pop P One", sans-serif;
  font-size: 13px; color: var(--accent);
}
.opt-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
}
.opt {
  background: #fff8e8; border: 2px solid var(--ink); border-radius: 10px;
  padding: 6px 4px;
  cursor: pointer; text-align: center;
  font-size: 11px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.opt.on { background: #ffe6a8; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(255,107,138,0.25); }
.opt .swatch {
  width: 100%; aspect-ratio: 1; border-radius: 8px; border: 1.5px solid var(--ink);
}
.opt .swatch svg { width: 100%; height: 100%; display: block; }

.opt-toggle {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
}
.opt-toggle .opt { flex-direction: row; justify-content: flex-start; padding: 8px 10px; }
.opt-toggle .opt .emoji { font-size: 22px; }

/* Bottom action */
.bottom {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.bottom button {
  background: #fff; border: 3px solid var(--ink); color: var(--ink);
  border-radius: 14px; padding: 12px 0;
  font-family: "Mochiy Pop P One", sans-serif; font-size: 14px;
  cursor: pointer; box-shadow: 3px 3px 0 var(--ink);
}
.bottom button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
.bottom .randomize { background: var(--accent-2); }
.bottom .save     { background: var(--accent); color: #fff; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translate(-50%, 30px);
  background: var(--ink); color: #fff;
  padding: 8px 16px; border-radius: 999px;
  font-size: 13px; opacity: 0; transition: 0.25s;
  z-index: 200;
}
.toast.show { opacity: 1; transform: translate(-50%, 0); }
</style>

<div id="app">
  <header>
    <h1 class="title">マイおうち</h1>
    <div style="display:flex; gap:5px;">
      <button class="icon-btn" id="btn-share">🔗</button>
      <button class="icon-btn" id="btn-reset">↺</button>

    <button class="save" id="btn-save">💾 保存</button>
